<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Club TCG - Edición Definitiva</title>
    <style>
        :root { --gold: #ffd700; --gold-light: #fff3a0; --table-green: #143a22; --dark-panel: rgba(10, 10, 10, 0.98); --gold-gradient: linear-gradient(145deg, #d4af37, #8a6d3b); --text-gradient: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); }
        body { margin: 0; padding: 0; background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%), url('https://www.transparenttextures.com/patterns/dark-matter.png'), var(--table-green); height: 100vh; display: flex; flex-direction: column; font-family: 'Segoe UI', Roboto, sans-serif; color: white; border: 20px solid #2c1a0b; box-sizing: border-box; overflow: hidden; }
        .hidden { display: none !important; }
        .plate-btn { padding: 18px 45px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: 2px solid rgba(255, 215, 0, 0.5); border-radius: 12px; background: var(--gold-gradient); color: #2c1a0b; box-shadow: 0 6px #5e4a26; transition: all 0.2s; min-width: 200px; }
        .btn-nav { background: linear-gradient(145deg, #4e342e, #2c1a0b); color: #ffe0b2; box-shadow: 0 6px #1a0f06; min-width: 160px; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; padding: 15px 40px; background: rgba(0,0,0,0.4); border-bottom: 2px solid rgba(255, 215, 0, 0.2); height: 60px; gap: 10px; }
        .grid-cartas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { background: #000; border-radius: 12px; border: 3px solid rgba(255,255,255,0.8); height: 260px; transition: 0.3s; cursor: pointer; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-10px) scale(1.05); border-color: var(--gold); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modal Eliminación */
        #modal-eliminar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 40px; border: 2px solid var(--gold); border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <main id="main-menu" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;">
        <img src="https://i.postimg.cc/y6pH3tbL/1776704252476.webp" width="350">
        <div class="sub-btns">
            <button class="plate-btn btn-nav" onclick="irAColeccion()">COLECCIÓN</button>
            <button class="plate-btn btn-nav" onclick="irAMazos()">MAZOS</button>
        </div>
    </main>

    <div id="collection-wrapper" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <header class="top-bar"><button class="plate-btn btn-nav" onclick="irAlMenu()">Volver</button></header>
        <div style="padding: 20px; overflow-y: auto;">
            <h2 style="color:var(--gold)">Líderes</h2><div id="grid-lideres" class="grid-cartas"></div>
            <h2 style="color:var(--gold)">Unidades</h2><div id="grid-unidades" class="grid-cartas"></div>
        </div>
    </div>

    <div id="deck-builder-screen" class="hidden" style="height: 100%; display: flex; flex-direction: column; padding: 20px;">
        <header class="top-bar">
            <input type="text" id="deck-name" placeholder="Nombre mazo..." class="plate-btn btn-nav">
            <button class="plate-btn btn-nav" onclick="guardarMazo()">Guardar</button>
            <button class="plate-btn btn-nav" onclick="volverAlMenu()">Volver</button>
        </header>
        <main style="flex: 1; overflow-y: auto; padding: 20px;">
            <h3>Líder: <span id="lider-sel" style="color: gold;">Ninguno</span></h3>
            <div id="deck-cards" class="grid-cartas" style="border: 2px dashed gold; min-height: 200px; padding: 10px;"></div>
            <h3>Biblioteca</h3>
            <div id="library-cards" class="grid-cartas"></div>
        </main>
    </div>

    <div id="modal-eliminar" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3>¿Quitar esta carta?</h3>
            <button class="plate-btn" onclick="confirmarEliminar()">ELIMINAR</button>
        </div>
    </div>

    <script>
        let datosCartas = [], miMazo = { lider: null, cartas: [] }, indexAEliminar = null;

        async function cargarDatos() {
            if(datosCartas.length > 0) return;
            const r = await fetch('cartas.json');
            datosCartas = await r.json();
        }

        function irAMazos() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('deck-builder-screen').classList.remove('hidden');
            cargarDatos().then(renderizarEditor);
        }

        function irAColeccion() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('collection-wrapper').classList.remove('hidden');
            cargarDatos().then(renderizarColeccion);
        }

        function volverAlMenu() {
            document.getElementById('deck-builder-screen').classList.add('hidden');
            document.getElementById('collection-wrapper').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function renderizarEditor() {
            const lib = document.getElementById('library-cards');
            lib.innerHTML = datosCartas.map((c, i) => `<div class="card" onclick="gestionarCarta(${i})"><img src="${c.img}"></div>`).join('');
        }

        function gestionarCarta(i) {
            const c = datosCartas[i];
            if (c.clase.toLowerCase().includes('lider')) {
                miMazo.lider = c;
                document.getElementById('lider-sel').innerText = c.nombre;
            } else {
                if (miMazo.cartas.length >= 60) return alert("Máximo 60");
                miMazo.cartas.push(c);
                actualizarVista();
            }
        }

        function actualizarVista() {
            const cont = document.getElementById('deck-cards');
            cont.innerHTML = miMazo.cartas.map((c, i) => `<div class="card" onclick="indexAEliminar=${i}; document.getElementById('modal-eliminar').style.display='flex'"><img src="${c.img}"></div>`).join('');
        }

        function confirmarEliminar() {
            miMazo.cartas.splice(indexAEliminar, 1);
            actualizarVista();
            document.getElementById('modal-eliminar').style.display = 'none';
        }

        function guardarMazo() {
            if (!miMazo.lider || miMazo.cartas.length < 50) return alert("Falta líder o mínimo 50 cartas.");
            localStorage.setItem('mazo_' + document.getElementById('deck-name').value, JSON.stringify(miMazo));
            alert("Mazo guardado");
        }

        function renderizarColeccion() {
            const gl = document.getElementById('grid-lideres');
            const gu = document.getElementById('grid-unidades');
            datosCartas.forEach((c, i) => {
                const html = `<div class="card"><img src="${c.img}"></div>`;
                if(c.clase.toLowerCase().includes('lider')) gl.innerHTML += html;
                else gu.innerHTML += html;
            });
        }
        
        function irAlMenu() { volverAlMenu(); }
    </script>
</body>
</html>
